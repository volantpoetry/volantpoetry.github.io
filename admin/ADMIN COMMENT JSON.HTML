// --- Generate Cloudinary Icon URL from badgePrompt ---
function generateCloudinaryIcon(badgePrompt) {
  // Replace spaces with underscores to avoid URL issues
  const iconName = badgePrompt.replace(/\s+/g, "_");
  return `https://res.cloudinary.com/dzoq4pgjn/image/upload/w_50,h_50,c_fill,q_auto,f_auto/${iconName}.png`;
}

// --- Push achievements to Firestore (no duplicates) ---
async function pushAchievementsToFirestore() {
  const snapshot = await getDocs(collection(db, "achievements"));
  const existingTitles = new Set(snapshot.docs.map(docSnap => docSnap.data().title));

  for (const ach of achievementsJSON) {
    if (!existingTitles.has(ach.name)) {
      await addDoc(collection(db, "achievements"), {
        title: ach.name,
        description: ach.description,
        condition: ach.criteria,
        active: true,
        imageUrl: generateCloudinaryIcon(ach.badgePrompt),
        badgePrompt: ach.badgePrompt
      });
    }
  }
}

// --- Load Achievements ---
async function loadAchievements() {
  const list = document.getElementById("achievementsList");
  list.innerHTML = "";
  const snapshot = await getDocs(collection(db, "achievements"));

  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const id = docSnap.id;
    const div = document.createElement("div");
    div.className = "achievement";
    div.innerHTML = `
      <img src="${data.imageUrl || generateCloudinaryIcon(data.badgePrompt || 'star')}" alt="badge">
      <div class="achievement-details">
        <strong>${data.title}</strong> - ${data.description} <br>
        Condition: ${data.condition.type} ≥ ${JSON.stringify(data.condition.min)} <br>
        Badge Prompt: ${data.badgePrompt || ''}
      </div>
      <div class="achievement-actions">
        <button onclick="editAchievement('${id}')">Edit</button>
        <button onclick="deleteAchievement('${id}')">Delete</button>
      </div>
    `;
    list.appendChild(div);
  });
}

// --- Form Submission ---
const form = document.getElementById("achievementForm");
form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const type = document.getElementById("conditionType").value;
  const min = parseInt(document.getElementById("conditionMin").value);
  const active = document.getElementById("active").checked;
  const achId = document.getElementById("achId").value;

  try {
    if (achId) {
      const achRef = doc(db, "achievements", achId);
      await updateDoc(achRef, { title, description, condition: { type, min }, active });
    } else {
      await addDoc(collection(db, "achievements"), {
        title,
        description,
        condition: { type, min },
        active,
        badgePrompt: title.toLowerCase(),
        imageUrl: generateCloudinaryIcon(title.toLowerCase())
      });
    }
    form.reset();
    document.getElementById("achId").value = "";
    loadAchievements();
  } catch (err) {
    console.error(err);
    alert("Failed to save achievement.");
  }
});

// --- Edit Achievement ---
window.editAchievement = async (id) => {
  const snapshot = await getDocs(collection(db, "achievements"));
  const dataSnap = snapshot.docs.find(d => d.id === id)?.data();
  if (!dataSnap) return;
  document.getElementById("title").value = dataSnap.title || "";
  document.getElementById("description").value = dataSnap.description || "";
  document.getElementById("conditionType").value = dataSnap.condition?.type || "poemsSubmitted";
  document.getElementById("conditionMin").value = dataSnap.condition?.min || 1;
  document.getElementById("active").checked = dataSnap.active || false;
  document.getElementById("achId").value = id;
}

// --- Delete Achievement ---
window.deleteAchievement = async (id) => {
  if (!confirm("Are you sure you want to delete this achievement?")) return;
  await deleteDoc(doc(db, "achievements", id));
  loadAchievements();
}

// --- Initialize ---
pushAchievementsToFirestore().then(() => loadAchievements());
</script>
