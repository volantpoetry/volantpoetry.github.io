    form label {

    }

    input[type="email"] {
      width: 100%;

    }

    input[type="email"]:focus {

    }

    .btn-primary {
      width: 100%;
      padding: 0.9rem;

      border-radius: 60px;
      background-color: #4b2aad;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 8px 18px -6px #4b2aad80;
    }

    .btn-primary:hover {
      background-color: #3a1f8a;
      transform: scale(1.01);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      box-shadow: none;
      pointer-events: none;
    }

    .status {
      margin: 0.8rem 0 0.2rem;
      padding: 0.9rem 1rem;
      border-radius: 40px;
      text-align: center;
      font-size: 0.95rem;
      background-color: #fee9e7;
      color: #b3261e;
      border-left: 4px solid #b3261e;
      font-weight: 500;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background-color: #e3f3e9;
      color: #1e6f3f;
      border-left-color: #1e6f3f;
    }

    /* simple success message (no username exposed) */
    .reset-confirm-message {
      background: #e5f0ff;
      border-radius: 40px;
      padding: 1rem 1.5rem;
      margin: 1.2rem 0 0.5rem;
      font-size: 1rem;

      color: #113355;

    .tip-box {

    .links {

    .links a {

    .links a:hover {

    hr {

    .try-now-link {

      color: #4b2aad;
      font-weight: 600;
      text-decoration: underline;
      cursor: pointer;
      padding: 0;
      font-size: 0.9rem;
    }

                <input type="hidden" name="returnUrl" id="returnUrl" value="">
                <script>
                    // Store return URL from query parameter
                    (function() {
                        const urlParams = new URLSearchParams(window.location.search);
                        const returnUrl = urlParams.get('returnUrl') || 
                                        sessionStorage.getItem('returnUrl') || 
                                        document.referrer || 
                                        window.location.pathname;
                        
                        // Don't redirect to login or signup pages
                        const excludePages = ['login', 'signup', 'verify', 'reset'];
                        let finalReturnUrl = returnUrl;
                        if (excludePages.some(page => finalReturnUrl.includes(page))) {
                            finalReturnUrl = '/index.html';

                        // Store in session storage

                        // Set hidden input

                            input.value = finalReturnUrl;

      <label for="reset-email">📧 your Gmail address</label>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    // Firestore to check existing credentials (storage verification)
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC4DHI8aBVY4JjTvJ-r-TGIDPsewtEWxzU",
      authDomain: "silent-depth.firebaseapp.com",
      projectId: "silent-depth",
      storageBucket: "silent-depth.firebasestorage.app",
      messagingSenderId: "78008755450",
      appId: "1:78008755450:web:3fd0f0f298a08820935543",
      measurementId: "G-WSWDCB7KD8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app); // for storage lookup

    // ==================== PLATFORM DETECTION ====================
    const urlParams = new URLSearchParams(window.location.search);
    const platform = urlParams.get('platform') || 'poetry';
    const redirectUrl = urlParams.get('redirect');

    const platformConfig = {
      poetry: {
        name: 'Volant Poetry',
        homeUrl: 'index.html'
      },
      reads: {
        name: 'Volant Reads',
        homeUrl: 'store/index.html'
      },
      foundry: {
        name: 'Volant Foundry',
        homeUrl: 'parent-house.html'
      }
    };

    const currentPlatform = platformConfig[platform] || platformConfig.poetry;

    // Update brand name
    document.getElementById('platformBrandName').textContent = currentPlatform.name;

    // Update back to login link
    const backToLoginLink = document.getElementById('backToLoginLink');
    const loginParams = new URLSearchParams();
    loginParams.append('platform', platform);
    if (redirectUrl) loginParams.append('redirect', redirectUrl);
    backToLoginLink.href = `universal-login.html?${loginParams.toString()}`;

    // DOM elements
    const resetForm = document.getElementById("reset-form");
    const emailInput = document.getElementById("reset-email");
    const statusDiv = document.getElementById("reset-status");
    const spamTip = document.getElementById("spam-tip");
    const confirmMessage = document.getElementById("confirmMessage");
    const tryAgainBtn = document.getElementById("tryAgainBtn");
    const sendBtn = document.getElementById("send-btn");

    // Hide extras initially
    statusDiv.classList.remove("show");
    spamTip.style.display = "none";
    confirmMessage.style.display = "none";

    // Try again button: reset UI
    tryAgainBtn.addEventListener("click", (e) => {
      e.preventDefault();
      spamTip.style.display = "none";
      confirmMessage.style.display = "none";
      statusDiv.textContent = "";
      statusDiv.classList.remove("show", "success");
      emailInput.focus();
    });

    function setStatus(message, isSuccess = false) {
      statusDiv.textContent = message;
      statusDiv.classList.add("show");
      if (isSuccess) {
        statusDiv.classList.add("success");
      } else {
        statusDiv.classList.remove("success");
      }
    }

    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      // Reset UI
      statusDiv.textContent = "";
      statusDiv.classList.remove("show", "success");
      spamTip.style.display = "none";
      confirmMessage.style.display = "none";

      if (!email || !email.includes('@')) {
        setStatus("⚠ please enter a valid email address", false);
        emailInput.focus();
        return;
      }

      // Disable button
      sendBtn.disabled = true;
      sendBtn.textContent = "account verification";

      try {
        // --- STEP 1: check if email exists in Firestore (storage) ---
        // "users" collection must contain a document with field 'email'
        // adjust collection name if needed (e.g., "accounts", "profiles")
        const usersRef = collection(db, "users");
        const q = query(usersRef, where("email", "==", email));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          // No matching document -> email not registered
          setStatus("❌ email not found. please sign up first.", false);
          sendBtn.disabled = false;
          sendBtn.textContent = "Continue";
          return;
        }

        // --- email EXISTS in storage --- we do NOT expose username, just silently proceed

        // --- STEP 2: send Firebase password reset email ---
        await sendPasswordResetEmail(auth, email);

        // Show simple confirmation (no username revealed)
        confirmMessage.style.display = "block";
        
        // Also show spam tips
        spamTip.style.display = "block";

        // Clear email field for security/cleanliness
        emailInput.value = "";

        // Optional: also show a success status (but confirmMessage already visible)
        setStatus("✅ reset link on the way", true); // brief, then confirmMessage is primary

      } catch (err) {
        console.error("reset error:", err);
        let errorMsg = "⚠ unable to send reset email.";
        switch (err.code) {
          case 'auth/user-not-found':
            // This can happen if Firebase Auth doesn't have the user even though Firestore had it
            errorMsg = "account inconsistency (auth missing). contact support.";
            break;
          case 'auth/invalid-email':
            errorMsg = "invalid email format.";
            break;
          case 'auth/too-many-requests':
            errorMsg = "too many attempts. please wait.";
            break;
          default:
            errorMsg = err.message || errorMsg;
        }
        setStatus(`⚠ ${errorMsg}`, false);
        confirmMessage.style.display = "none";
      } finally {
        // Re-enable button
        sendBtn.disabled = false;
        sendBtn.textContent = "Continue";
      }
    });
  </script>
  <!-- The Firestore query uses the "users" collection with an 'email' field.

            <script>
            // Return URL Handler - Redirect to previous page after login
            (function() {
                // Function to get return URL
                function getReturnUrl() {
                    // Check URL parameters first
                    const urlParams = new URLSearchParams(window.location.search);
                    let returnUrl = urlParams.get('returnUrl');
                    
                    // Check session storage
                    if (!returnUrl) {
                        returnUrl = sessionStorage.getItem('returnUrl');
                    }
                    
                    // Check referrer
                    if (!returnUrl || returnUrl === 'null' || returnUrl === 'undefined') {
                        returnUrl = document.referrer || window.location.pathname;
                    }
                    
                    // Exclude auth pages
                    const excludePages = ['login', 'signup', 'verify', 'reset', 'check-verification'];
                    if (excludePages.some(page => returnUrl.includes(page))) {
                        returnUrl = '/index.html';
                    }
                    
                    // Clean up URL
                    if (returnUrl) {
                        // Remove any existing returnUrl parameters to avoid loops
                        returnUrl = returnUrl.split('?')[0];
                        // Make sure it starts with /
                        if (!returnUrl.startsWith('/') && !returnUrl.startsWith('http')) {
                            returnUrl = '/' + returnUrl;
                        }
                    }
                    
                    return returnUrl || '/index.html';
                }
                
                // Function to redirect after successful login
                window.redirectAfterLogin = function() {
                    const returnUrl = getReturnUrl();
                    sessionStorage.removeItem('returnUrl'); // Clean up
                    window.location.href = returnUrl;
                };
                
                // Save return URL when page loads (for login page)
                if (window.location.pathname.includes('login') || 
                    window.location.pathname.includes('signup')) {
                    const returnUrl = getReturnUrl();
                    sessionStorage.setItem('returnUrl', returnUrl);
                    
                    // Update any login form action to include returnUrl
                    document.addEventListener('DOMContentLoaded', function() {
                        const forms = document.querySelectorAll('form');
                        forms.forEach(form => {
                            if (form.action && form.action.includes('login')) {
                                const hiddenInput = document.createElement('input');
                                hiddenInput.type = 'hidden';
                                hiddenInput.name = 'returnUrl';
                                hiddenInput.value = returnUrl;
                                form.appendChild(hiddenInput);
                            }
                        });
                    });
                }
                
                // Intercept successful login responses
                const originalFetch = window.fetch;
                window.fetch = function(...args) {
                    return originalFetch.apply(this, args).then(response => {
                        // Check if this is a login response
                        const url = args[0];
                        if (typeof url === 'string' && url.includes('login')) {
                            const clonedResponse = response.clone();
                            clonedResponse.json().then(data => {
                                if (data.success || data.token || data.user) {
                                    // Login successful - redirect
                                    setTimeout(() => {
                                        const returnUrl = getReturnUrl();
                                        sessionStorage.removeItem('returnUrl');
                                        window.location.href = returnUrl;
                                    }, 500);
                                }
                            }).catch(() => {});
                        }
                        return response;
                    });
                };
                
                // Store current page before navigating to login
                document.addEventListener('click', function(e) {
                    const link = e.target.closest('a');
                    if (link) {
                        const href = link.getAttribute('href');
                        if (href && (href.includes('login') || href.includes('signup'))) {
                            // Store current page before leaving
                            const currentPath = window.location.pathname;
                            if (!currentPath.includes('login') && !currentPath.includes('signup')) {
                                sessionStorage.setItem('returnUrl', currentPath);
                            }
                        }
                    }
                });
            })();
            </script>
            
<script src="return-url-handler.js"></script>
